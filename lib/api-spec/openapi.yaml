openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: MannMitra API - AI Wellness Companion for Exam Aspirants
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: journals
    description: Journal entry operations
  - name: chat
    description: AI chat companion
  - name: dashboard
    description: Dashboard and analytics
  - name: sos
    description: SOS emergency settings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /journals:
    get:
      operationId: listJournals
      tags: [journals]
      summary: List journal entries for current user
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: language
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of journal entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalListResponse"
    post:
      operationId: createJournal
      tags: [journals]
      summary: Create a new journal entry with AI analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalInput"
      responses:
        "201":
          description: Journal entry created with AI analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Journal"

  /journals/{id}:
    get:
      operationId: getJournal
      tags: [journals]
      summary: Get a specific journal entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Journal entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Journal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteJournal
      tags: [journals]
      summary: Delete a journal entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /chat/messages:
    get:
      operationId: listChatMessages
      tags: [chat]
      summary: Get chat history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Chat history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send message to AI companion and get response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: AI companion response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary with mood trends and stress overview
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/burnout:
    get:
      operationId: getBurnoutPrediction
      tags: [dashboard]
      summary: Get burnout risk prediction based on recent journal entries
      responses:
        "200":
          description: Burnout prediction analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BurnoutPrediction"

  /dashboard/subject-heatmap:
    get:
      operationId: getSubjectHeatmap
      tags: [dashboard]
      summary: Get subject-level stress heatmap data
      responses:
        "200":
          description: Subject stress heatmap
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubjectStressEntry"

  /dashboard/mood-calendar:
    get:
      operationId: getMoodCalendar
      tags: [dashboard]
      summary: Get mood data for calendar heatmap
      parameters:
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Mood calendar entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MoodCalendarEntry"

  /sos/settings:
    get:
      operationId: getSosSettings
      tags: [sos]
      summary: Get SOS emergency contact settings
      responses:
        "200":
          description: SOS settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SosSettings"
    put:
      operationId: updateSosSettings
      tags: [sos]
      summary: Update SOS emergency contact settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SosSettingsInput"
      responses:
        "200":
          description: Updated SOS settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SosSettings"

  /sos/trigger:
    post:
      operationId: triggerSos
      tags: [sos]
      summary: Trigger SOS alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SosTriggerInput"
      responses:
        "200":
          description: SOS triggered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SosTriggerResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RegisterInput:
      type: object
      required: [email, password, name, examType]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        name:
          type: string
        examType:
          type: string
          enum: [JEE, NEET, UPSC, GATE, CAT, CUET, OTHER]

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, email, name, examType]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        examType:
          type: string
        preferredLanguage:
          type: ["string", "null"]
        createdAt:
          type: string

    JournalInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
        language:
          type: string
          default: "en"
        subjects:
          type: array
          items:
            type: string

    Journal:
      type: object
      required: [id, content, language, createdAt]
      properties:
        id:
          type: integer
        content:
          type: string
        language:
          type: string
        subjects:
          type: array
          items:
            type: string
        moodScore:
          type: ["number", "null"]
        stressLevel:
          type: ["string", "null"]
        stressTriggers:
          type: array
          items:
            type: string
        aiInsight:
          type: ["string", "null"]
        createdAt:
          type: string

    JournalListResponse:
      type: object
      required: [entries, total, page, limit]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/Journal"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ChatMessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
        language:
          type: string
          default: "en"

    ChatMessage:
      type: object
      required: [id, role, content, createdAt]
      properties:
        id:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        createdAt:
          type: string

    DashboardSummary:
      type: object
      required: [totalJournals, averageMood, currentStreakDays, weeklyMoodTrend, topStressTriggers, recentInsights]
      properties:
        totalJournals:
          type: integer
        averageMood:
          type: number
        currentStreakDays:
          type: integer
        weeklyMoodTrend:
          type: array
          items:
            $ref: "#/components/schemas/MoodTrendPoint"
        topStressTriggers:
          type: array
          items:
            type: string
        recentInsights:
          type: array
          items:
            type: string
        examType:
          type: ["string", "null"]

    MoodTrendPoint:
      type: object
      required: [date, mood]
      properties:
        date:
          type: string
        mood:
          type: number
        label:
          type: ["string", "null"]

    BurnoutPrediction:
      type: object
      required: [riskLevel, riskScore, analysis, suggestions, basedOnEntries]
      properties:
        riskLevel:
          type: string
          enum: [low, moderate, high, critical]
        riskScore:
          type: number
        analysis:
          type: string
        suggestions:
          type: array
          items:
            type: string
        basedOnEntries:
          type: integer
        warningSigns:
          type: array
          items:
            type: string

    SubjectStressEntry:
      type: object
      required: [subject, stressScore, entryCount]
      properties:
        subject:
          type: string
        stressScore:
          type: number
        entryCount:
          type: integer
        trend:
          type: ["string", "null"]

    MoodCalendarEntry:
      type: object
      required: [date, mood]
      properties:
        date:
          type: string
        mood:
          type: number
        stressLevel:
          type: ["string", "null"]

    SosSettings:
      type: object
      required: [id, contactName, contactPhone]
      properties:
        id:
          type: integer
        contactName:
          type: string
        contactPhone:
          type: string
        contactEmail:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        isActive:
          type: boolean

    SosSettingsInput:
      type: object
      required: [contactName, contactPhone]
      properties:
        contactName:
          type: string
        contactPhone:
          type: string
        contactEmail:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        isActive:
          type: boolean

    SosTriggerInput:
      type: object
      properties:
        note:
          type: ["string", "null"]

    SosTriggerResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string
